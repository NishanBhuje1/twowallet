name: twowallet
description: Mine. Yours. Ours.
publish_to: none
version: 1.0.0+11

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Subscriptions / paywall
  purchases_flutter: ^8.11.0
  purchases_ui_flutter: ^8.11.0

  # UI
  intl: ^0.19.0
  flutter_svg: ^2.0.10
  gap: ^3.0.1

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  app_links: ^6.1.1
  http: ^1.2.0

  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  posthog_flutter: ^4.0.1

  # Social sign in
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3

  flutter_local_notifications: ^17.2.2
timezone: ^0.9.4
permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/onboarding/
